name: Provision emergency dataplane

on:
  repository_dispatch:
    types: [provision_emergency]
  workflow_dispatch:

concurrency:
  group: silo-emergency-provisioning
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  provision:
    runs-on: ubuntu-latest
    env:
      HETZNER_API_TOKEN: ${{ secrets.HETZNER_API_TOKEN }}
      STATUS_CALLBACK_URL: ${{ secrets.STATUS_CALLBACK_URL }}
      STATUS_CALLBACK_SECRET: ${{ secrets.STATUS_CALLBACK_SECRET }}
      STATUS_BOOTSTRAP_URL: ${{ secrets.STATUS_BOOTSTRAP_URL }}
      STATUS_BOOTSTRAP_SECRET: ${{ secrets.STATUS_BOOTSTRAP_SECRET }}
      DATAPLANE_IMAGE: ghcr.io/${{ github.repository_owner }}/silo-dataplane:latest
      CADDY_IMAGE: ghcr.io/${{ github.repository_owner }}/silo-caddy:latest
      CLOUDFLARE_DNS_API_TOKEN: ${{ secrets.CLOUDFLARE_DNS_API_TOKEN }}
      DATABASE_URL: ${{ secrets.AIVEN_DATABASE_URL }}
      REDIS_PASSWORD: ${{ secrets.EMERGENCY_REDIS_PASSWORD }}
      DATAPLANE_INTERNAL_SECRET: ${{ secrets.DATAPLANE_INTERNAL_SECRET }}
      S3_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY_ID }}
      S3_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_ACCESS_KEY }}
      S3_ENDPOINT: ${{ secrets.S3_ENDPOINT }}
      S3_BUCKET_NAME: ${{ secrets.S3_BUCKET_NAME }}
      S3_REGION: ${{ secrets.S3_REGION }}
      S3_DOMAIN: onsilo.dev
      DASHBOARD_DOMAIN: dash.onsilo.dev
      INCIDENT_ID: ${{ github.event.client_payload.incident_id || github.run_id }}
    steps:
      - uses: actions/checkout@v4
      - name: Create or reuse the temporary server
        id: server
        shell: bash
        run: |
          set -euo pipefail
          api="https://api.hetzner.cloud/v1"
          existing_response="$(curl -fsS -H "Authorization: Bearer $HETZNER_API_TOKEN" "$api/servers?label_selector=app%3Dsilo-emergency")"
          existing_count="$(jq '.servers | length' <<<"$existing_response")"
          [ "$existing_count" -le 1 ] || { echo "Refusing to provision while multiple emergency servers exist"; exit 1; }
          existing="$(jq -r '.servers[0] // empty' <<<"$existing_response")"
          if [ -n "$existing" ]; then
            existing_incident="$(jq -r '.labels.incident // ""' <<<"$existing")"
            [ "$existing_incident" = "$INCIDENT_ID" ] || { echo "Refusing to reuse an emergency server from another incident"; exit 1; }
            id="$(jq -r '.id' <<<"$existing")"
            ip="$(jq -r '.public_net.ipv4.ip' <<<"$existing")"
          else
            runtime="$(printf '%s\n' "DATAPLANE_IMAGE=$DATAPLANE_IMAGE" "CADDY_IMAGE=$CADDY_IMAGE" "CLOUDFLARE_DNS_API_TOKEN=$CLOUDFLARE_DNS_API_TOKEN" "EMERGENCY_REDIS_PASSWORD=$REDIS_PASSWORD" "DATABASE_URL=$DATABASE_URL" "DATAPLANE_INTERNAL_SECRET=$DATAPLANE_INTERNAL_SECRET" "DATAPLANE_WRITER_INSTANCE_ID=emergency-$INCIDENT_ID" "S3_ACCESS_KEY_ID=$S3_ACCESS_KEY_ID" "S3_SECRET_ACCESS_KEY=$S3_SECRET_ACCESS_KEY" "S3_ENDPOINT=$S3_ENDPOINT" "S3_BUCKET_NAME=$S3_BUCKET_NAME" "S3_REGION=$S3_REGION" "S3_DOMAIN=$S3_DOMAIN" "DASHBOARD_DOMAIN=$DASHBOARD_DOMAIN")"
            bootstrap_response="$(curl -fsS -X POST -H "Authorization: Bearer $STATUS_BOOTSTRAP_SECRET" -H 'content-type: application/json' --data "$(jq -n --arg runtime "$runtime" --arg incidentId "$INCIDENT_ID" '{runtime:$runtime,incidentId:$incidentId}')" "$STATUS_BOOTSTRAP_URL/register")"
            bootstrap_token="$(jq -er '.token' <<<"$bootstrap_response")"
            echo "::add-mask::$bootstrap_token"
            compose_b64="$(base64 < deploy/emergency/docker-compose.yml | tr -d '\n')"
            caddy_b64="$(base64 < deploy/emergency/Caddyfile | tr -d '\n')"
            cloud_init="$(sed -e "s|__COMPOSE_B64__|$compose_b64|" -e "s|__CADDY_B64__|$caddy_b64|" -e "s|__BOOTSTRAP_URL__|$STATUS_BOOTSTRAP_URL|" -e "s|__BOOTSTRAP_TOKEN__|$bootstrap_token|" deploy/emergency/cloud-init.yaml)"
            payload="$(jq -n --arg name "silo-emergency-${GITHUB_RUN_ID}" --arg incident "$INCIDENT_ID" --arg user_data "$cloud_init" '{name:$name,server_type:"cx23",location:"fsn1",image:"ubuntu-24.04",labels:{app:"silo-emergency",incident:$incident},user_data:$user_data,start_after_create:true}')"
            created="$(curl -fsS -X POST -H "Authorization: Bearer $HETZNER_API_TOKEN" -H 'content-type: application/json' --data "$payload" "$api/servers")"
            id="$(jq -r '.server.id' <<<"$created")"
            ip="$(jq -r '.server.public_net.ipv4.ip' <<<"$created")"
          fi
          echo "id=$id" >> "$GITHUB_OUTPUT"
          echo "ip=$ip" >> "$GITHUB_OUTPUT"
          curl -fsS -X POST -H "Authorization: Bearer $STATUS_CALLBACK_SECRET" -H 'content-type: application/json' --data "$(jq -n --argjson server_id "$id" --arg ip "$ip" --arg incident_id "$INCIDENT_ID" '{server_id:$server_id,ip:$ip,incident_id:$incident_id}')" "$STATUS_CALLBACK_URL/provisioning"
      - name: Wait for real readiness
        run: |
          set -euo pipefail
          curl -fsS -X POST -H "Authorization: Bearer $STATUS_CALLBACK_SECRET" -H 'content-type: application/json' --data "$(jq -n --arg incident_id "$INCIDENT_ID" '{incident_id:$incident_id}')" "$STATUS_CALLBACK_URL/starting"
          ready=false
          deadline=$((SECONDS + 900))
          while [ "$SECONDS" -lt "$deadline" ]; do
            if curl --fail --silent --show-error --max-time 5 -H "x-dataplane-secret: $DATAPLANE_INTERNAL_SECRET" https://emergency-origin.onsilo.dev/ready; then
              ready=true
              break
            fi
            sleep 5
          done
          [ "$ready" = "true" ] || { echo "Timed out waiting for readiness"; exit 1; }
          curl -fsS -X POST -H "Authorization: Bearer $STATUS_CALLBACK_SECRET" -H 'content-type: application/json' --data "$(jq -n --arg incident_id "$INCIDENT_ID" '{incident_id:$incident_id}')" "$STATUS_CALLBACK_URL/verifying"
      - name: Report ready for activation
        run: |
          curl -fsS -X POST -H "Authorization: Bearer $STATUS_CALLBACK_SECRET" -H 'content-type: application/json' --data "$(jq -n --argjson server_id '${{ steps.server.outputs.id }}' --arg ip '${{ steps.server.outputs.ip }}' --arg incident_id "$INCIDENT_ID" '{server_id:$server_id,ip:$ip,incident_id:$incident_id}')" "$STATUS_CALLBACK_URL/ready"
      - name: Report provisioning failure
        if: failure()
        env:
          SERVER_ID: ${{ steps.server.outputs.id }}
          SERVER_IP: ${{ steps.server.outputs.ip }}
        run: |
          payload="$(jq -n --arg server_id "$SERVER_ID" --arg ip "$SERVER_IP" --arg incident_id "$INCIDENT_ID" --arg message "Emergency provisioning workflow failed" '{server_id:($server_id | tonumber? // null),ip:$ip,incident_id:$incident_id,message:$message}')"
          curl -fsS -X POST -H "Authorization: Bearer $STATUS_CALLBACK_SECRET" -H 'content-type: application/json' --data "$payload" "$STATUS_CALLBACK_URL/failed"
