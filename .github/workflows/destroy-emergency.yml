name: Destroy emergency dataplane

on:
  repository_dispatch:
    types: [destroy_emergency]
  workflow_dispatch:
    inputs:
      server_id:
        description: Hetzner server ID
        required: true
      primary_dns_confirmed:
        description: Set true only after onsilo.dev points at PawHost
        required: true
        type: boolean

permissions:
  contents: read

jobs:
  destroy:
    runs-on: ubuntu-latest
    env:
      HETZNER_API_TOKEN: ${{ secrets.HETZNER_API_TOKEN }}
      STATUS_CALLBACK_URL: ${{ secrets.STATUS_CALLBACK_URL }}
      STATUS_CALLBACK_SECRET: ${{ secrets.STATUS_CALLBACK_SECRET }}
      SERVER_ID: ${{ inputs.server_id || github.event.client_payload.server_id }}
      PRIMARY_DNS_CONFIRMED: ${{ inputs.primary_dns_confirmed || github.event.client_payload.primary_dns_confirmed }}
      SAFE_TO_DELETE: ${{ github.event.client_payload.safe_to_delete || false }}
      RESOLVE_INCIDENT: ${{ github.event.client_payload.resolve_incident || false }}
      ACCOUNTING_REQUIRED: ${{ github.event.client_payload.accounting_required || false }}
      INCIDENT_ID: ${{ github.event.client_payload.incident_id || '' }}
      S3_DNS_NAME: onsilo.dev
      PRIMARY_IPV4: ${{ secrets.PRIMARY_IPV4 }}
      DATAPLANE_INTERNAL_SECRET: ${{ secrets.DATAPLANE_INTERNAL_SECRET }}
      EMERGENCY_READY_URL: https://emergency-origin.onsilo.dev
    steps:
      - name: Confirm primary DNS is active
        shell: bash
        run: |
          set -euo pipefail
          [ -n "$SERVER_ID" ] || { echo "Missing Hetzner server ID"; exit 1; }
          if [ "$SAFE_TO_DELETE" != "true" ]; then
            [ "$PRIMARY_DNS_CONFIRMED" = "true" ] || { echo "Refusing deletion before primary DNS is confirmed"; exit 1; }
            getent ahostsv4 "$S3_DNS_NAME" | awk '{print $1}' | grep -Fx "$PRIMARY_IPV4" >/dev/null || { echo "Public DNS does not point to the primary"; exit 1; }
          fi
      - name: Flush and verify emergency accounting in Aiven
        if: env.ACCOUNTING_REQUIRED == 'true'
        shell: bash
        run: |
          set -euo pipefail
          curl -fsS --max-time 20 -X POST -H "x-dataplane-secret: $DATAPLANE_INTERNAL_SECRET" -H 'content-type: application/json' --data '{"enabled":true}' "$EMERGENCY_READY_URL/api/internal/drain" | jq -e '.ok == true and .draining == true' >/dev/null
          flushed=false
          for _ in 1 2 3 4 5; do
            if response="$(curl -fsS --max-time 20 -X POST -H "x-dataplane-secret: $DATAPLANE_INTERNAL_SECRET" "$EMERGENCY_READY_URL/api/internal/accounting/flush")" && jq -e '.ok == true and .pending == 0 and .unsafe_state == false' >/dev/null <<<"$response"; then
              flushed=true
              break
            fi
            sleep 5
          done
          [ "$flushed" = "true" ] || { echo "Accounting flush was not verified; retaining the Hetzner server"; exit 1; }
          readiness="$(curl -fsS --max-time 20 -H "x-dataplane-secret: $DATAPLANE_INTERNAL_SECRET" "$EMERGENCY_READY_URL/ready")"
          jq -e '.activeWriter == false' >/dev/null <<<"$readiness" || { echo "Emergency is still the active writer; refusing teardown"; exit 1; }
      - name: Delete server only after all safety checks pass
        shell: bash
        run: |
          set -euo pipefail
          if [ "$ACCOUNTING_REQUIRED" = "true" ] && [ "$SAFE_TO_DELETE" != "true" ]; then
            getent ahostsv4 "$S3_DNS_NAME" | awk '{print $1}' | grep -Fx "$PRIMARY_IPV4" >/dev/null || { echo "DNS changed after accounting flush; refusing deletion"; exit 1; }
          fi
          code="$(curl -sS -o /tmp/hetzner-delete.json -w '%{http_code}' -X DELETE -H "Authorization: Bearer $HETZNER_API_TOKEN" "https://api.hetzner.cloud/v1/servers/$SERVER_ID")"
          [ "$code" = "204" ] || [ "$code" = "404" ] || { cat /tmp/hetzner-delete.json; exit 1; }
          curl -fsS -X POST -H "Authorization: Bearer $STATUS_CALLBACK_SECRET" -H 'content-type: application/json' --data "$(jq -n --arg incident_id "$INCIDENT_ID" --argjson resolve_incident "$RESOLVE_INCIDENT" '{incident_id:$incident_id,resolve_incident:$resolve_incident}')" "$STATUS_CALLBACK_URL/destroyed"
      - name: Alert when safety checks block teardown
        if: failure() && env.ACCOUNTING_REQUIRED == 'true'
        run: |
          curl -fsS -X POST -H "Authorization: Bearer $STATUS_CALLBACK_SECRET" -H 'content-type: application/json' --data "$(jq -n --arg incident_id "$INCIDENT_ID" '{incident_id:$incident_id}')" "$STATUS_CALLBACK_URL/flush-failed"
