<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Silo CDN - Drag & Drop Upload</title>
    <link rel="stylesheet" href="/assets/styles.css" />
  </head>
  <body
    class="min-h-screen selection:bg-hc-red selection:text-white flex flex-col font-sans bg-hc-darker"
  >
    <nav
      class="w-full bg-hc-darker border-b border-white/10 px-6 py-4 sticky top-0 z-50 flex justify-between items-center"
    >
      <div class="flex items-center gap-4">
        <a
          href="/"
          class="font-bold text-2xl tracking-tighter italic text-white hover:text-hc-red transition-colors"
          >SILO</a
        >
        <span
          class="bg-blue-500/20 text-blue-400 px-2 py-0.5 rounded text-sm font-mono border border-blue-500/30"
          >CDN</span
        >
      </div>
      <div class="flex items-center gap-6 font-bold text-sm">
        <a
          href="/dashboard"
          class="text-text-muted hover:text-white transition-colors"
          >Dashboard</a
        >
        <div class="flex items-center gap-2">
          <img id="user-avatar" src="" alt="" class="w-6 h-6 rounded-full hidden" />
          <span class="text-text-muted font-mono" id="user-id">Loading...</span>
        </div>
      </div>
    </nav>

    <main class="flex-1 flex flex-col items-center justify-center p-6 w-full max-w-4xl mx-auto">
      
      <div class="text-center mb-10">
        <h1 class="text-4xl md:text-5xl font-black text-white mb-4 tracking-tight">
          Drag. Drop. <span class="text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-emerald-400">Deploy.</span>
        </h1>
        <p class="text-text-muted text-lg max-w-2xl mx-auto">
          Upload files directly to your personal CDN bucket. Instant public links, backed by your Slack identity.
        </p>
      </div>

      <!-- Upload Zone -->
      <div
        id="drop-zone"
        class="w-full max-w-2xl aspect-video bg-white/5 border-2 border-dashed border-white/10 rounded-3xl flex flex-col items-center justify-center p-8 transition-all duration-300 hover:border-blue-400/50 hover:bg-blue-500/5 cursor-pointer relative overflow-hidden group"
      >
        <input
          type="file"
          id="file-input"
          class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10"
          multiple
        />
        
        <div class="text-center pointer-events-none transition-transform duration-300 group-hover:scale-105" id="upload-prompt">
          <div class="bg-blue-500/20 p-4 rounded-full inline-flex mb-4 text-blue-400">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12" />
            </svg>
          </div>
          <h3 class="text-xl font-bold text-white mb-2">Drop files here</h3>
          <p class="text-text-muted text-sm">or click to browse</p>
        </div>

        <!-- Uploading State -->
        <div id="uploading-state" class="hidden flex-col items-center w-full max-w-md z-20 pointer-events-none">
            <div class="w-full bg-white/10 rounded-full h-2 mb-4 overflow-hidden">
                <div id="progress-bar" class="bg-blue-500 h-2 rounded-full transition-all duration-100" style="width: 0%"></div>
            </div>
            <p class="text-white font-mono text-sm animate-pulse">Uploading <span id="file-count">0</span> files...</p>
        </div>
      </div>

      <!-- Recent Uploads -->
      <div id="results-area" class="w-full max-w-2xl mt-8 hidden">
        <h3 class="text-sm font-bold text-text-muted uppercase tracking-wider mb-4">Just Uploaded</h3>
        <div class="space-y-3" id="results-list">
            <!-- Results injected here -->
        </div>
      </div>

    </main>

    <script>
      const dropZone = document.getElementById('drop-zone');
      const fileInput = document.getElementById('file-input');
      const uploadPrompt = document.getElementById('upload-prompt');
      const uploadingState = document.getElementById('uploading-state');
      const progressBar = document.getElementById('progress-bar');
      const fileCount = document.getElementById('file-count');
      const resultsArea = document.getElementById('results-area');
      const resultsList = document.getElementById('results-list');

      // Drag & Drop Visuals
      ['dragenter', 'dragover'].forEach(eventName => {
        dropZone.addEventListener(eventName, highlight, false);
      });
      ['dragleave', 'drop'].forEach(eventName => {
        dropZone.addEventListener(eventName, unhighlight, false);
      });

      function highlight(e) {
        dropZone.classList.add('border-blue-400', 'bg-blue-500/10');
        dropZone.classList.remove('border-white/10', 'bg-white/5');
      }

      function unhighlight(e) {
        dropZone.classList.remove('border-blue-400', 'bg-blue-500/10');
        dropZone.classList.add('border-white/10', 'bg-white/5');
      }

      // Handle File Selection
      fileInput.addEventListener('change', handleFiles);

      async function handleFiles(e) {
        const files = e.target.files;
        if (!files.length) return;

        uploadFiles(files);
      }

      async function uploadFiles(files) {
        // Reset UI
        uploadPrompt.classList.add('hidden');
        uploadingState.classList.remove('hidden');
        uploadingState.classList.add('flex');
        fileCount.textContent = files.length;
        progressBar.style.width = '0%';

        let completed = 0;
        const total = files.length;
        const results = [];

        for (const file of files) {
            const formData = new FormData();
            formData.append('file', file);

            try {
                const res = await fetch('/api/cdn/upload', {
                    method: 'POST',
                    body: formData
                });

                if (res.ok) {
                    const data = await res.json();
                    results.push({ success: true, name: file.name, url: data.url });
                } else {
                    const err = await res.text();
                    results.push({ success: false, name: file.name, error: err });
                }
            } catch (e) {
                results.push({ success: false, name: file.name, error: "Network error" });
            }

            completed++;
            progressBar.style.width = `${(completed / total) * 100}%`;
        }

        // Show Results
        uploadingState.classList.add('hidden');
        uploadingState.classList.remove('flex');
        uploadPrompt.classList.remove('hidden');
        fileInput.value = ''; // Reset input

        displayResults(results);
      }

      function displayResults(results) {
        resultsArea.classList.remove('hidden');
        
        results.forEach(res => {
            const div = document.createElement('div');
            div.className = 'bg-white/5 border border-white/10 rounded-xl p-4 flex items-center justify-between animate-fade-in';
            
            if (res.success) {
                div.innerHTML = `
                    <div class="flex items-center gap-3 overflow-hidden">
                        <div class="bg-emerald-500/20 p-2 rounded-lg text-emerald-400 shrink-0">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
                            </svg>
                        </div>
                        <div class="min-w-0">
                            <p class="text-white font-medium truncate text-sm">${res.name}</p>
                            <a href="${res.url}" target="_blank" class="text-blue-400 hover:text-blue-300 text-xs truncate block hover:underline">${res.url}</a>
                        </div>
                    </div>
                    <button onclick="copyToClipboard('${res.url}', this)" class="ml-4 text-text-muted hover:text-white transition-colors p-2 hover:bg-white/10 rounded-lg shrink-0" title="Copy URL">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z" />
                        </svg>
                    </button>
                `;
            } else {
                div.innerHTML = `
                    <div class="flex items-center gap-3 overflow-hidden">
                        <div class="bg-red-500/20 p-2 rounded-lg text-red-400 shrink-0">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                            </svg>
                        </div>
                        <div class="min-w-0">
                            <p class="text-white font-medium truncate text-sm">${res.name}</p>
                            <p class="text-red-400 text-xs truncate">${res.error}</p>
                        </div>
                    </div>
                `;
            }
            
            // Insert at top
            resultsList.insertBefore(div, resultsList.firstChild);
        });
      }

      function copyToClipboard(text, btn) {
        navigator.clipboard.writeText(text).then(() => {
            const originalHTML = btn.innerHTML;
            btn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-emerald-400" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd" /></svg>';
            setTimeout(() => {
                btn.innerHTML = originalHTML;
            }, 2000);
        });
      }

      // Load User Info
      fetch('/api/dashboard/stats').then(res => res.json()).then(data => {
        document.getElementById('user-id').textContent = data.user.id;
        if (data.user.slackId) {
            const avatar = document.getElementById("user-avatar");
            avatar.src = `https://cachet.dunkirk.sh/users/${data.user.slackId}/r`;
            avatar.classList.remove("hidden");
        }
      }).catch(() => {
        window.location.href = '/auth/login';
      });
    </script>
  </body>
</html>
