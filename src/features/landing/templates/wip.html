<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Work In Progress - Silo</title>
    <link rel="stylesheet" href="/assets/styles.css" />
  </head>
  <body
    class="min-h-screen selection:bg-hc-red selection:text-white flex flex-col font-sans bg-hc-darker text-white"
  >
    <nav
      class="w-full bg-hc-darker border-b border-white/10 px-6 py-4 sticky top-0 z-50 flex justify-between items-center"
    >
      <div class="flex items-center gap-4">
        <a
          href="/"
          class="font-bold text-2xl tracking-tighter italic text-white hover:text-hc-red transition-colors"
          >SILO</a
        >
      </div>
    </nav>

    <main class="flex-1 flex items-center justify-center p-6">
      <div class="max-w-md w-full bg-hc-dark rounded-3xl border border-white/10 p-8 card-shadow text-center">
        <div class="w-16 h-16 bg-hc-red/20 rounded-full flex items-center justify-center mx-auto mb-6">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-hc-red" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" />
            </svg>
        </div>
        
        <h1 class="text-2xl font-bold text-white mb-4">Work In Progress</h1>
        
        <p class="text-text-muted mb-8">
            Silo is currently under active development. Access is restricted to existing users or those with an access code.
        </p>

        <!-- ERROR_PLACEHOLDER -->

        <form action="/auth/wip" method="POST" class="space-y-4">
            <div>
                <input
                    type="password"
                    name="code"
                    placeholder="Enter access code"
                    class="w-full bg-white/5 border border-white/10 rounded-lg px-4 py-3 text-white placeholder-text-muted focus:outline-none focus:border-hc-red transition-colors"
                    required
                />
            </div>
            <button
                type="submit"
                class="w-full bg-hc-red hover:bg-hc-red/90 text-white font-bold py-3 px-4 rounded-lg transition-colors"
            >
                Access Silo
            </button>
        </form>
      </div>
    </main>
  </body>
</html>
