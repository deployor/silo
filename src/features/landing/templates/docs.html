<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cargo Docs</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Space+Grotesk:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css"
      rel="stylesheet"
    />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-bash.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-javascript.min.js"></script>

    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            fontFamily: {
              sans: ["Space Grotesk", "sans-serif"],
              mono: ["JetBrains Mono", "monospace"],
            },
            colors: {
              "hc-red": "#ec3750",
              "hc-dark": "#17171d",
              "hc-darker": "#131316",
              "hc-blue": "#338eda",
              "sidebar-bg": "#1c1c21",
              "text-main": "#e0e6ed",
              "text-muted": "#94a3b8",
            },
          },
        },
      };
    </script>
    <style>
      body {
        background-color: #131316;
        color: #e0e6ed;
      }
      .section-content {
        display: none;
      }
      .section-content.active {
        display: block;
      }
      .nav-link.active {
        color: #ec3750;
        font-weight: bold;
        background-color: rgba(236, 55, 80, 0.1);
      }

      /* Custom Scrollbar */
      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.1);
        border-radius: 3px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: rgba(255, 255, 255, 0.2);
      }
    </style>
  </head>
  <body
    class="min-h-screen selection:bg-hc-red selection:text-white flex flex-col"
  >
    <nav
      class="w-full bg-hc-darker border-b border-white/10 px-6 py-4 sticky top-0 z-50 flex justify-between items-center"
    >
      <div class="flex items-center gap-4">
        <a
          href="/"
          class="font-bold text-2xl tracking-tighter italic text-white hover:text-hc-red transition-colors"
          >CARGO</a
        >
        <span
          class="bg-hc-red/20 text-hc-red px-2 py-0.5 rounded text-sm font-mono border border-hc-red/30"
          >DOCS</span
        >
      </div>
      <div class="hidden md:flex gap-6 font-bold text-sm text-text-muted">
        <a href="/dashboard" class="hover:text-white transition-colors"
          >Dashboard</a
        >
        <a
          href="https://hackclub.com"
          target="_blank"
          class="hover:text-white transition-colors"
          >Hack Club</a
        >
      </div>
    </nav>

    <div class="flex flex-1 max-w-7xl mx-auto w-full">
      <!-- Sidebar -->
      <aside
        class="w-64 hidden md:block h-[calc(100vh-65px)] sticky top-[65px] border-r border-white/10 bg-hc-dark p-6 overflow-y-auto"
      >
        <div class="space-y-8">
          <div>
            <h5
              class="font-bold text-text-muted text-xs uppercase tracking-wider mb-3 pl-3"
            >
              Basics
            </h5>
            <ul class="space-y-1 text-sm font-medium">
              <li>
                <button
                  onclick="showSection('intro')"
                  class="nav-link text-left w-full hover:text-white transition-colors py-2 px-3 rounded-lg"
                  id="nav-intro"
                >
                  What is this?
                </button>
              </li>
              <li>
                <button
                  onclick="showSection('auth')"
                  class="nav-link text-left w-full hover:text-white transition-colors py-2 px-3 rounded-lg"
                  id="nav-auth"
                >
                  Get Access
                </button>
              </li>
              <li>
                <button
                  onclick="showSection('structure')"
                  class="nav-link text-left w-full hover:text-white transition-colors py-2 px-3 rounded-lg"
                  id="nav-structure"
                >
                  Projects & Keys
                </button>
              </li>
            </ul>
          </div>

          <div>
            <h5
              class="font-bold text-text-muted text-xs uppercase tracking-wider mb-3 pl-3"
            >
              How To Use
            </h5>
            <ul class="space-y-1 text-sm font-medium">
              <li>
                <button
                  onclick="showSection('aws-cli')"
                  class="nav-link text-left w-full hover:text-white transition-colors py-2 px-3 rounded-lg"
                  id="nav-aws-cli"
                >
                  AWS CLI
                </button>
              </li>
              <li>
                <button
                  onclick="showSection('js')"
                  class="nav-link text-left w-full hover:text-white transition-colors py-2 px-3 rounded-lg"
                  id="nav-js"
                >
                  JavaScript / Bun
                </button>
              </li>
              <li>
                <button
                  onclick="showSection('rclone')"
                  class="nav-link text-left w-full hover:text-white transition-colors py-2 px-3 rounded-lg"
                  id="nav-rclone"
                >
                  rclone
                </button>
              </li>
            </ul>
          </div>

          <div>
            <h5
              class="font-bold text-text-muted text-xs uppercase tracking-wider mb-3 pl-3"
            >
              Reference
            </h5>
            <ul class="space-y-1 text-sm font-medium">
              <li>
                <button
                  onclick="showSection('endpoints')"
                  class="nav-link text-left w-full hover:text-white transition-colors py-2 px-3 rounded-lg"
                  id="nav-endpoints"
                >
                  Endpoints & Regions
                </button>
              </li>
              <li>
                <button
                  onclick="showSection('limits')"
                  class="nav-link text-left w-full hover:text-white transition-colors py-2 px-3 rounded-lg"
                  id="nav-limits"
                >
                  Limits & Quotas
                </button>
              </li>
            </ul>
          </div>
        </div>
      </aside>

      <!-- Main Content -->
      <main class="flex-1 p-6 md:p-12 max-w-3xl">
        <!-- Intro -->
        <div id="intro" class="section-content active">
          <h1 class="text-4xl font-bold mb-6 text-white">WIP</h1>
          <p class="text-lg mb-6 text-text-muted leading-relaxed">
            WIP WIP WIP
          </p>
        </div>

        <!-- Auth -->
        <div id="auth" class="section-content">
          <h1 class="text-4xl font-bold mb-6 text-white">WIP</h1>
          <p class="text-lg mb-6 text-text-muted">
            WIP WIP WIP
          </p>
        </div>

        <!-- Structure -->
        <div id="structure" class="section-content">
          <h1 class="text-4xl font-bold mb-6 text-white">WIP</h1>
          <p class="text-lg mb-6 text-text-muted">
            WIP WIP WIP
          </p>
        </div>

        <!-- AWS CLI -->
        <div id="aws-cli" class="section-content">
          <h1 class="text-4xl font-bold mb-6 text-white">WIP</h1>
          <p class="mb-6 text-text-muted">
            WIP WIP WIP
          </p>
        </div>

        <!-- JS -->
        <div id="js" class="section-content">
          <h1 class="text-4xl font-bold mb-6 text-white">WIP</h1>
          <p class="mb-6 text-text-muted">
            WIP WIP WIP
          </p>
        </div>

        <!-- rclone -->
        <div id="rclone" class="section-content">
          <h1 class="text-4xl font-bold mb-6 text-white">WIP</h1>
          <p class="mb-6 text-text-muted">
            WIP WIP WIP
          </p>
        </div>

        <!-- Endpoints -->
        <div id="endpoints" class="section-content">
          <h1 class="text-4xl font-bold mb-6 text-white">WIP</h1>
          <p class="mb-6 text-text-muted">
            WIP WIP WIP
          </p>
        </div>

        <!-- Limits -->
        <div id="limits" class="section-content">
          <h1 class="text-4xl font-bold mb-6 text-white">WIP</h1>
          <p class="mb-6 text-text-muted">WIP WIP WIP</p>
        </div>
      </main>
    </div>

    <script>
      function showSection(id) {
        // Hide all sections
        document.querySelectorAll(".section-content").forEach((el) => {
          el.classList.remove("active");
        });
        // Show selected section
        document.getElementById(id).classList.add("active");

        // Update nav state
        document.querySelectorAll(".nav-link").forEach((el) => {
          el.classList.remove("active");
        });
        document.getElementById("nav-" + id).classList.add("active");
      }

      // Handle hash navigation
      if (window.location.hash) {
        const hash = window.location.hash.substring(1);
        if (document.getElementById(hash)) {
          showSection(hash);
        }
      }
    </script>
  </body>
</html>
