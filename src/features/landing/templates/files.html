<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>File Explorer - Cargo</title>
    <link rel="stylesheet" href="/assets/styles.css" />
  </head>
  <body
    class="min-h-screen selection:bg-hc-red selection:text-white flex flex-col font-sans"
  >
    <nav
      class="w-full bg-hc-darker border-b border-white/10 px-6 py-4 sticky top-0 z-50 flex justify-between items-center"
    >
      <div class="flex items-center gap-4">
        <a
          href="/"
          class="font-bold text-2xl tracking-tighter italic text-white hover:text-hc-red transition-colors"
          >CARGO</a
        >
        <a href="/" class="text-text-muted hover:text-white transition-colors">Dashboard</a>
        <span class="text-text-muted">/</span>
        <span
          class="bg-hc-blue/20 text-hc-blue px-2 py-0.5 rounded text-sm font-mono border border-hc-blue/30"
          id="nav-bucket-name"
          >Loading...</span
        >
      </div>
      <div class="flex items-center gap-6 font-bold text-sm">
        <!-- ADMIN_LINK -->
        <a
          href="/docs"
          class="text-text-muted hover:text-white transition-colors"
          >Docs</a
        >
        <span class="text-text-muted font-mono" id="user-id">Loading...</span>
        <a
          href="/auth/logout"
          class="text-hc-red hover:text-white transition-colors"
          >Logout</a
        >
      </div>
    </nav>

    <main class="max-w-7xl mx-auto w-full px-6 py-8">
      <div class="flex justify-between items-center mb-6">
        <h1 class="text-3xl font-bold text-white">File Explorer</h1>
        <div class="flex gap-3">
            <input 
                type="text" 
                id="search-input" 
                placeholder="Search files..." 
                class="bg-hc-dark border border-white/10 rounded-xl px-4 py-2 text-sm text-white focus:outline-none focus:border-hc-blue w-64"
                onkeydown="if(event.key === 'Enter') searchFiles()"
            >
            <button onclick="searchFiles()" class="bg-white/10 hover:bg-white/20 text-white px-4 py-2 rounded-xl text-sm font-bold transition-colors">
                Search
            </button>
        </div>
      </div>

      <!-- Breadcrumbs -->
      <div class="flex items-center gap-2 text-sm font-mono mb-4 overflow-x-auto whitespace-nowrap pb-2" id="breadcrumbs">
        <!-- Breadcrumbs injected here -->
      </div>

      <!-- Files Table -->
      <div
        class="bg-hc-dark rounded-3xl border border-white/10 overflow-hidden card-shadow"
      >
        <div class="overflow-x-auto">
          <table class="w-full text-left text-sm">
            <thead
              class="bg-white/5 text-text-muted font-bold uppercase text-xs tracking-wider"
            >
              <tr>
                <th class="px-6 py-4 w-10">Type</th>
                <th class="px-6 py-4">Name</th>
                <th class="px-6 py-4">Size</th>
                <th class="px-6 py-4">Last Modified</th>
                <th class="px-6 py-4 text-right">Actions</th>
              </tr>
            </thead>
            <tbody class="divide-y divide-white/5" id="files-table">
              <!-- Files will be inserted here -->
            </tbody>
          </table>
        </div>
        
        <div class="p-4 border-t border-white/10 flex justify-center" id="load-more-container">
            <button 
                id="load-more-btn"
                onclick="loadMore()"
                class="text-text-muted hover:text-white text-sm font-bold py-2 px-4 rounded-lg hover:bg-white/5 transition-colors hidden"
            >
                Load More
            </button>
        </div>
      </div>
    </main>

    <!-- Preview Modal -->
    <div
      id="preview-modal"
      class="fixed inset-0 bg-black/90 backdrop-blur-sm hidden items-center justify-center z-50 p-8"
    >
      <div class="relative w-full max-w-4xl max-h-full flex flex-col items-center">
        <button 
            onclick="closePreview()"
            class="absolute -top-12 right-0 text-white hover:text-hc-red transition-colors"
        >
            <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
            </svg>
        </button>
        
        <div id="preview-content" class="w-full max-h-[75vh] overflow-auto rounded-lg border border-white/10 bg-hc-dark">
            <!-- Preview content injected here -->
        </div>
        <div class="mt-4 text-center flex flex-col gap-2">
            <p id="preview-filename" class="text-white font-bold text-lg"></p>
            <a id="preview-download" href="#" target="_blank" class="text-hc-blue hover:underline text-sm">Download File</a>
        </div>
      </div>
    </div>

    <!-- Confirmation Modal -->
    <div
      id="confirm-modal"
      class="fixed inset-0 bg-black/80 backdrop-blur-sm hidden items-center justify-center z-50"
    >
      <div
        class="bg-hc-dark rounded-3xl border border-white/10 p-8 w-full max-w-md card-shadow transform transition-all"
      >
        <h3 class="text-2xl font-bold mb-4 text-white" id="confirm-title">
          Confirm Action
        </h3>
        <p class="text-text-muted mb-8" id="confirm-message">
          Are you sure you want to proceed?
        </p>

        <div class="flex justify-end gap-3">
          <button
            onclick="closeConfirmModal()"
            class="text-text-muted hover:text-white px-4 py-2 text-sm font-bold transition-colors"
          >
            Cancel
          </button>
          <button
            id="confirm-btn"
            class="bg-hc-red hover:bg-red-600 text-white px-6 py-3 rounded-xl text-sm font-bold transition-all hover:scale-105 card-shadow flex items-center gap-2"
          >
            <span id="confirm-btn-text">Confirm</span>
            <svg
              id="confirm-spinner"
              class="animate-spin h-4 w-4 text-white hidden"
              xmlns="http://www.w3.org/2000/svg"
              fill="none"
              viewBox="0 0 24 24"
            >
              <circle
                class="opacity-25"
                cx="12"
                cy="12"
                r="10"
                stroke="currentColor"
                stroke-width="4"
              ></circle>
              <path
                class="opacity-75"
                fill="currentColor"
                d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"
              ></path>
            </svg>
          </button>
        </div>
      </div>
    </div>

    <script>
      const bucketName = window.location.pathname.split('/')[3];
      document.getElementById('nav-bucket-name').textContent = bucketName;

      let currentPrefix = '';
      let continuationToken = null;
      let isLoading = false;

      function formatBytes(bytes, decimals = 2) {
        if (!+bytes) return "0 Bytes";
        const k = 1024;
        const dm = decimals < 0 ? 0 : decimals;
        const sizes = ["Bytes", "KB", "MB", "GB", "TB", "PB", "EB", "ZB", "YB"];
        const i = Math.floor(Math.log(bytes) / Math.log(k));
        return `${parseFloat((bytes / k ** i).toFixed(dm))} ${sizes[i]}`;
      }

      async function loadFiles(prefix = '', token = null, reset = false) {
        if (isLoading) return;
        isLoading = true;
        
        const loadMoreBtn = document.getElementById('load-more-btn');
        if (loadMoreBtn) loadMoreBtn.textContent = "Loading...";

        try {
            let url = `/api/dashboard/buckets/${bucketName}/files?prefix=${encodeURIComponent(prefix)}`;
            if (token) {
                url += `&continuation-token=${encodeURIComponent(token)}`;
            }

            const res = await fetch(url);
            if (!res.ok) throw new Error("Failed to load files");
            
            const data = await res.json();
            
            // Update User ID if present in response (optional, but good for consistency)
            if (data.userId) document.getElementById("user-id").textContent = data.userId;

            renderBreadcrumbs(prefix);
            renderFiles(data.files, data.folders, reset);
            
            continuationToken = data.nextContinuationToken;
            
            if (continuationToken) {
                loadMoreBtn.classList.remove('hidden');
                loadMoreBtn.textContent = "Load More";
            } else {
                loadMoreBtn.classList.add('hidden');
            }

            currentPrefix = prefix;
        } catch (error) {
            console.error(error);
            alert("Failed to load files");
        } finally {
            isLoading = false;
        }
      }

      function renderBreadcrumbs(prefix) {
        const container = document.getElementById('breadcrumbs');
        const parts = prefix.split('/').filter(p => p);
        
        let html = `<button onclick="navigateTo('')" class="hover:text-white ${parts.length === 0 ? 'text-white font-bold' : 'text-text-muted'}">root</button>`;
        
        let currentPath = '';
        parts.forEach((part, index) => {
            currentPath += `${part}/`;
            const isLast = index === parts.length - 1;
            html += ` <span class="text-text-muted">/</span> `;
            html += `<button onclick="navigateTo('${currentPath}')" class="hover:text-white ${isLast ? 'text-white font-bold' : 'text-text-muted'}">${part}</button>`;
        });
        
        container.innerHTML = html;
      }

      function renderFiles(files, folders, reset) {
        const tbody = document.getElementById('files-table');
        if (reset) tbody.innerHTML = '';

        if (files.length === 0 && folders.length === 0 && reset) {
            tbody.innerHTML = '<tr><td colspan="5" class="px-6 py-8 text-center text-text-muted italic">No files found.</td></tr>';
            return;
        }

        // Render Folders
        folders.forEach(folder => {
            const row = document.createElement('tr');
            row.className = 'hover:bg-white/5 transition-colors cursor-pointer group';
            row.onclick = (e) => {
                if (!e.target.closest('button')) navigateTo(folder.prefix);
            };
            
            row.innerHTML = `
                <td class="px-6 py-4 text-hc-blue">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                        <path d="M2 6a2 2 0 012-2h5l2 2h5a2 2 0 012 2v6a2 2 0 01-2 2H4a2 2 0 01-2-2V6z" />
                    </svg>
                </td>
                <td class="px-6 py-4 font-medium text-white font-mono">${folder.name}</td>
                <td class="px-6 py-4 text-text-muted">-</td>
                <td class="px-6 py-4 text-text-muted">-</td>
                <td class="px-6 py-4 text-right"></td>
            `;
            tbody.appendChild(row);
        });

        // Render Files
        files.forEach(file => {
            const row = document.createElement('tr');
            row.className = 'hover:bg-white/5 transition-colors group';
            
            row.innerHTML = `
                <td class="px-6 py-4 text-text-muted">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                    </svg>
                </td>
                <td class="px-6 py-4 font-medium text-white font-mono break-all">${file.name}</td>
                <td class="px-6 py-4 text-text-muted font-mono text-xs">${formatBytes(file.size)}</td>
                <td class="px-6 py-4 text-text-muted font-mono text-xs">${new Date(file.lastModified).toLocaleString()}</td>
                <td class="px-6 py-4 text-right flex justify-end gap-2">
                    <button onclick="previewFile('${file.key}', '${file.url}')" class="text-hc-blue hover:text-blue-400 text-xs font-bold uppercase tracking-wider transition-colors">Preview</button>
                    <button onclick="deleteFile('${file.key}')" class="text-hc-red hover:text-red-400 text-xs font-bold uppercase tracking-wider opacity-0 group-hover:opacity-100 transition-all">Delete</button>
                </td>
            `;
            tbody.appendChild(row);
        });
      }

      function navigateTo(prefix) {
        loadFiles(prefix, null, true);
      }

      function _loadMore() {
        if (continuationToken) {
            loadFiles(currentPrefix, continuationToken, false);
        }
      }

      function _searchFiles() {
        const query = document.getElementById('search-input').value;
        // For now, search is just filtering by prefix if we wanted, but S3 doesn't support full text search easily.
        // We can treat the search query as a prefix search?
        // Or maybe the user wants to search *within* the current view?
        // "Search and all" usually implies searching the whole bucket.
        // S3 ListObjectsV2 only supports prefix.
        // So we will treat search as a prefix search from root.
        
        if (!query) {
            navigateTo('');
            return;
        }
        
        // If query doesn't end in /, it's a file prefix search
        loadFiles(query, null, true);
      }

      function _deleteFile(key) {
        openConfirmModal(
            "Delete File",
            `Are you sure you want to delete "${key}"? This cannot be undone.`,
            async () => {
                const res = await fetch(`/api/dashboard/buckets/${bucketName}/files?key=${encodeURIComponent(key)}`, {
                    method: "DELETE",
                });

                if (!res.ok) {
                    throw new Error("Failed to delete file");
                }

                // Reload current view
                loadFiles(currentPrefix, null, true);
            }
        );
      }

      async function _previewFile(key, url) {
        const modal = document.getElementById('preview-modal');
        const content = document.getElementById('preview-content');
        const filename = document.getElementById('preview-filename');
        const download = document.getElementById('preview-download');
        
        filename.textContent = key.split('/').pop();
        download.href = url;
        content.innerHTML = '<div class="text-text-muted flex items-center justify-center h-64">Loading preview...</div>';
        
        modal.classList.remove('hidden');
        modal.classList.add('flex');

        // Get signed URL for preview
        try {
            const res = await fetch(`/api/dashboard/buckets/${bucketName}/files/sign`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ key })
            });
            
            if (!res.ok) throw new Error("Failed to sign URL");
            const data = await res.json();
            const proxyUrl = data.url;

            // Update download link to use signed proxy URL (works for private buckets)
            download.href = proxyUrl;
            download.setAttribute('download', key.split('/').pop());

            // Determine file type
            const ext = key.split('.').pop().toLowerCase();
            const imageExts = ['jpg', 'jpeg', 'png', 'gif', 'webp', 'svg', 'bmp'];
            const videoExts = ['mp4', 'webm', 'ogg'];
            const audioExts = ['mp3', 'wav'];
            const textExts = ['txt', 'md', 'json', 'js', 'css', 'html', 'xml', 'csv', 'ts', 'sql'];
            
            if (imageExts.includes(ext)) {
                content.innerHTML = `<div class="flex items-center justify-center min-h-[200px]"><img src="${proxyUrl}" class="max-w-full max-h-[70vh] object-contain shadow-lg rounded" /></div>`;
            } else if (videoExts.includes(ext)) {
                content.innerHTML = `<div class="flex items-center justify-center min-h-[200px]"><video src="${proxyUrl}" controls class="max-w-full max-h-[70vh] rounded shadow-lg"></video></div>`;
            } else if (audioExts.includes(ext)) {
                content.innerHTML = `<div class="flex items-center justify-center min-h-[100px]"><audio src="${proxyUrl}" controls class="w-full max-w-md"></audio></div>`;
            } else if (textExts.includes(ext)) {
                fetch(proxyUrl).then(r => {
                    if (!r.ok) throw new Error("Failed to load");
                    return r.text();
                }).then(text => {
                    content.innerHTML = `<pre class="p-4 text-sm font-mono text-white whitespace-pre-wrap break-words">${text.replace(/</g, '<')}</pre>`;
                }).catch(() => {
                    content.innerHTML = '<div class="text-hc-red flex items-center justify-center h-64">Failed to load text content</div>';
                });
            } else {
                content.innerHTML = `
                    <div class="text-center flex flex-col items-center justify-center h-64">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-16 w-16 text-text-muted mx-auto mb-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                        </svg>
                        <p class="text-text-muted">Preview not available for this file type.</p>
                    </div>
                `;
            }
        } catch (_e) {
            content.innerHTML = '<div class="text-hc-red flex items-center justify-center h-64">Failed to load preview</div>';
        }
      }

      function _closePreview() {
        document.getElementById('preview-modal').classList.add('hidden');
        document.getElementById('preview-modal').classList.remove('flex');
        document.getElementById('preview-content').innerHTML = '';
      }

      function openConfirmModal(title, message, onConfirm) {
        document.getElementById("confirm-title").textContent = title;
        document.getElementById("confirm-message").textContent = message;
        
        const btn = document.getElementById("confirm-btn");
        btn.onclick = async () => {
            const spinner = document.getElementById("confirm-spinner");
            const btnText = document.getElementById("confirm-btn-text");
            
            btn.disabled = true;
            spinner.classList.remove("hidden");
            btnText.textContent = "Processing...";
            
            try {
                await onConfirm();
                closeConfirmModal();
            } catch (e) {
                console.error(e);
                alert("Action failed");
            } finally {
                btn.disabled = false;
                spinner.classList.add("hidden");
                btnText.textContent = "Confirm";
            }
        };
        
        document.getElementById("confirm-modal").classList.remove("hidden");
        document.getElementById("confirm-modal").classList.add("flex");
      }

      function closeConfirmModal() {
        document.getElementById("confirm-modal").classList.add("hidden");
        document.getElementById("confirm-modal").classList.remove("flex");
      }

      // Initial Load
      loadFiles();
    </script>
  </body>
</html>
