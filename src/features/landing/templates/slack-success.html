<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Silo - Account Linked</title>
    <link rel="stylesheet" href="/assets/styles.css" />
  </head>
  <body
    class="min-h-screen selection:bg-hc-red selection:text-white flex flex-col font-sans bg-hc-darker"
  >
    <nav
      class="w-full bg-hc-darker border-b border-white/10 px-6 py-4 sticky top-0 z-50 flex justify-between items-center"
    >
      <div class="flex items-center gap-4">
        <a
          href="/"
          class="font-bold text-2xl tracking-tighter italic text-white hover:text-hc-red transition-colors"
          >SILO</a
        >
      </div>
    </nav>

    <main class="flex-1 flex flex-col items-center justify-center p-6 w-full max-w-5xl mx-auto">
      
      <div class="text-center mb-16">
        <h1 class="text-6xl md:text-9xl font-black text-white mb-6 tracking-tighter italic">
          You're all set!
        </h1>
        <p class="text-text-muted text-xl max-w-2xl mx-auto font-medium">
          Your account has been successfully linked. You now have <span class="text-white font-bold">1GB</span> of storage quota available.
        </p>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-8 w-full max-w-4xl">
          <!-- Option 1: Back to Slack -->
          <a href="slack://open" class="bg-hc-dark border border-white/10 rounded-3xl p-10 card-shadow hover:border-hc-blue hover:bg-hc-blue/5 transition-all group flex flex-col items-center text-center">
              <div class="w-16 h-16 bg-hc-blue/10 rounded-2xl flex items-center justify-center mb-6 text-hc-blue border border-hc-blue/20 group-hover:scale-110 transition-transform">
                  <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 8l4 4m0 0l-4 4m4-4H3" />
                  </svg>
              </div>
              <h3 class="text-3xl font-bold text-white mb-3 group-hover:text-hc-blue transition-colors">Back to Slack</h3>
              <p class="text-text-muted text-lg">Return to Slack and try uploading your file again.</p>
          </a>

          <!-- Option 2: Web CDN -->
          <a href="/cdn" class="bg-hc-dark border border-white/10 rounded-3xl p-10 card-shadow hover:border-hc-red hover:bg-hc-red/5 transition-all group flex flex-col items-center text-center">
              <div class="w-16 h-16 bg-hc-red/10 rounded-2xl flex items-center justify-center mb-6 text-hc-red border border-hc-red/20 group-hover:scale-110 transition-transform">
                  <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12" />
                  </svg>
              </div>
              <h3 class="text-3xl font-bold text-white mb-3 group-hover:text-hc-red transition-colors">Use Web CDN</h3>
              <p class="text-text-muted text-lg">Upload files directly from your browser.</p>
          </a>
      </div>

      <div class="mt-16">
          <a href="/" class="text-text-muted hover:text-white text-sm font-bold uppercase tracking-wider transition-colors border-b border-transparent hover:border-white pb-0.5">
              Go to Dashboard
          </a>
      </div>

    </main>
  </body>
</html>
