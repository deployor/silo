<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Silo - Account Linked</title>
    <link rel="stylesheet" href="/assets/styles.css" />
  </head>
  <body
    class="min-h-screen selection:bg-hc-red selection:text-white flex flex-col font-sans bg-hc-darker"
  >
    <nav
      class="w-full bg-hc-darker border-b border-white/10 px-6 py-4 sticky top-0 z-50 flex justify-between items-center"
    >
      <div class="flex items-center gap-4">
        <a
          href="/"
          class="font-bold text-2xl tracking-tighter italic text-white hover:text-hc-red transition-colors"
          >SILO</a
        >
      </div>
    </nav>

    <main class="flex-1 flex flex-col items-center justify-center p-6 w-full max-w-4xl mx-auto">
      
      <div class="text-center">
        <h1 class="text-6xl md:text-9xl font-black text-white mb-8 tracking-tighter italic">
          You're all set!
        </h1>
        
        <p class="text-text-muted text-2xl max-w-3xl mx-auto font-medium mb-12 leading-relaxed">
          Your account is linked and you now have <span class="text-white font-bold">1GB</span> of storage quota.
          <br><br>
          You can now go back to Slack to upload files, or use the <a href="/cdn" class="text-hc-red hover:underline font-bold">Web CDN</a>.
        </p>

        <div class="flex items-center justify-center gap-6 text-sm font-bold uppercase tracking-wider">
            <a href="/" class="text-text-muted hover:text-white transition-colors border-b border-transparent hover:border-white pb-0.5">
                Go to Dashboard
            </a>
        </div>
      </div>

    </main>
  </body>
</html>
