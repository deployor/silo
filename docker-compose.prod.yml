services:
  control-plane:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        GIT_SHA: ${GIT_SHA:-unknown}
        GIT_DATE: ${GIT_DATE:-unknown}
        GIT_MESSAGE: ${GIT_MESSAGE:-unknown}
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PORT: "3000"
      DATAPLANE_URL: "http://dataplane:3001"
    volumes:
      - dataplane-cache:/var/cache/silo-dataplane:ro

  dataplane:
    build:
      context: ./dataplane
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATAPLANE_BIND: "0.0.0.0:3001"
      CONTROL_PLANE_URL: "http://control-plane:3000"
      DATAPLANE_PUBLIC_SCHEME: "https"
      DISK_CACHE_DIR: "/var/cache/silo-dataplane"
    depends_on:
      control-plane:
        condition: service_healthy
    volumes:
      - dataplane-cache:/var/cache/silo-dataplane

volumes:
  dataplane-cache:
