services:
  control-plane:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        GIT_SHA: ${GIT_SHA:-unknown}
        GIT_DATE: ${GIT_DATE:-unknown}
        GIT_MESSAGE: ${GIT_MESSAGE:-unknown}
    restart: unless-stopped
    env_file:
      - ${SILO_ENV_FILE:-.env}
    environment:
      PORT: "3000"
      DISK_CACHE_DIR: "/var/cache/silo-dataplane"
      DATAPLANE_URL: "http://dataplane:3001"
      REDIS_URL: "redis://:${REDIS_PASSWORD:?Set REDIS_PASSWORD in the deployment environment}@silo-dragonfly:6379"
    depends_on:
      silo-dragonfly:
        condition: service_started
    volumes:
      - dataplane-cache:/var/cache/silo-dataplane:ro
    # The PostgreSQL database is a separate Dokploy service. This keeps its
    # internal hostname reachable while the default network remains private.
    networks:
      - default
      - dokploy-network

  # Private, in-stack Redis-compatible cache. It is intentionally not exposed
  # on a host port: the control-plane reaches it over Docker's default network.
  silo-dragonfly:
    image: docker.dragonflydb.io/dragonflydb/dragonfly:latest
    restart: unless-stopped
    ulimits:
      memlock: -1
    command:
      - --requirepass=${REDIS_PASSWORD:?Set REDIS_PASSWORD in the deployment environment}
      - --maxmemory=8gb
      - --cache_mode=true
    volumes:
      - dragonflydata:/data

  dataplane:
    build:
      context: ./dataplane
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ${SILO_ENV_FILE:-.env}
    environment:
      DATAPLANE_BIND: "0.0.0.0:3001"
      CONTROL_PLANE_URL: "http://control-plane:3000"
      DATAPLANE_PUBLIC_SCHEME: "https"
      DISK_CACHE_DIR: "/var/cache/silo-dataplane"
      REDIS_URL: "redis://:${REDIS_PASSWORD:?Set REDIS_PASSWORD in the deployment environment}@silo-dragonfly:6379"
    depends_on:
      control-plane:
        condition: service_healthy
    volumes:
      - dataplane-cache:/var/cache/silo-dataplane

volumes:
  dataplane-cache:
  dragonflydata:

networks:
  dokploy-network:
    external: true
