display_information:
  name: Silo
  description: Manage your Silo S3 buckets directly from Slack.
  background_color: "#2C2D30"
features:
  app_home:
    home_tab_enabled: true
    messages_tab_enabled: true
    messages_tab_read_only_enabled: false
  bot_user:
    display_name: Silo
    always_online: true
oauth_config:
  scopes:
    bot:
      - chat:write
      - chat:write.customize
      - users:read
      - files:read
      - channels:history
      - groups:history
settings:
  event_subscriptions:
    request_url: https://dash.onsilo.dev/api/slack/events
    bot_events:
      - app_home_opened
      - message.im
      - message.channels
      - message.groups
  interactivity:
    is_enabled: true
    request_url: https://dash.onsilo.dev/api/slack/events
  org_deploy_enabled: false
  socket_mode_enabled: false
  token_rotation_enabled: false
